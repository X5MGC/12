<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; position: relative; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.18.1/meshopt_decoder.js"></script>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0xffffff, 0);
  renderer.outputEncoding = THREE.sRGBEncoding;

  var scene = new THREE.Scene();
  var aspect = canvas.clientWidth / canvas.clientHeight;
  var camera = new THREE.PerspectiveCamera(10, aspect, 0.3, 100);
  var baseDistance = 28;
  var cameraDistance = baseDistance / Math.min(aspect, 1);
  camera.position.set(cameraDistance * 0.68, cameraDistance * 0.08, cameraDistance * 0.71);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  var dir1 = new THREE.DirectionalLight(0xffffff, 0.6);
  dir1.position.set(0, 10, 0);
  scene.add(dir1);
  var dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dir2.position.set(5, 5, 5);
  scene.add(dir2);
  var pointLight = new THREE.PointLight(0xffffff, 1.2);
  pointLight.position.set(0, 8, 0);
  scene.add(pointLight);
  var frontLight = new THREE.PointLight(0xffffff, 0.8);
  frontLight.position.set(0, 3, 15);
  scene.add(frontLight);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.4));

  var controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = true;
  controls.maxPolarAngle = 1.56;
  controls.minPolarAngle = 1.3;
  controls.rotateSpeed = 0.5;
  controls.autoRotate = false;
  controls.target.set(0, 0, 0);

  function resize() {
    var w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    if (window._mixer) {
      window._mixer.update(0.016);
    }
  }
  animate();

  // --- Base64 chunk loading ---
  window._glbChunks = [];
  window.appendChunk = function(chunk) { window._glbChunks.push(chunk); };
  window.finishLoadGLB = function() {
    try {
      var base64 = window._glbChunks.join('');
      window._glbChunks = [];
      var raw = atob(base64);
      var bytes = new Uint8Array(raw.length);
      for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      console.log('GLB bytes:', bytes.length);

      var loader = new THREE.GLTFLoader();
      if (typeof MeshoptDecoder !== 'undefined' && MeshoptDecoder) {
        var ready = MeshoptDecoder.ready || Promise.resolve();
        ready.then(function() {
          console.log('MeshoptDecoder ready');
          loader.setMeshoptDecoder(MeshoptDecoder);
          parseGLB(loader, bytes);
        }).catch(function(err) {
          console.warn('MeshoptDecoder ready failed, try without:', err);
          parseGLB(loader, bytes);
        });
      } else {
        console.log('No MeshoptDecoder, parse directly');
        parseGLB(loader, bytes);
      }
    } catch(e) {
      console.error('loadGLB error:', e);
      if (window.FlutterChannel) window.FlutterChannel.postMessage('error:' + e);
    }
  };

  function parseGLB(loader, bytes) {
    loader.parse(bytes.buffer, '', function(gltf) {
      var model = gltf.scene;
      window._model = model;
      model.scale.set(1, 1, 1);

      // Remove model's own lights
      var lightsToRemove = [];
      model.traverse(function(child) {
        if (child.isLight) lightsToRemove.push(child);
      });
      lightsToRemove.forEach(function(light) { light.parent.remove(light); });

      // Light visibility config
      var lightVisibility = {
        'Light_L_LOn_Ext': false,
        'Light_R_LOn_Ext': false,
        'Light_L_LOn_Door_FL': false,
        'Light_R_LOn_Door_FR': false,
        'Light_L_LOn_LuggageDoor': false,
        'Light_R_LOn_LuggageDoor': false,
        'Light_BL_LOn_Ext': false,
        'Light_TL_LOn_Ext': false,
        'Light_DRL_LOn_Ext': false,
        'Light_HL_LOn_Ext': false,
        'Light_TL_LOn_LuggageDoor': false,
        'Light_BL_LOn_LuggageDoor': false,
        'LightGlass_Ext': true,
        'HightLight_Handle_FL': false
      };

      // Material config
      model.traverse(function(child) {
        if (!child.isMesh) return;
        child.frustumCulled = false;
        var name = child.name;

        if (name === 'WindowGlass_Ext') {
          child.material.opacity = 0.6;
          child.material.transparent = true;
        }

        if (lightVisibility.hasOwnProperty(name)) {
          if (child.material) {
            child.material.blending = THREE.AdditiveBlending;
          }
          child.visible = lightVisibility[name];
        }

        if (name.indexOf('CarPaint') !== -1 || name.indexOf('Body') !== -1) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.4,
            envMap: scene.environment,
            envMapIntensity: 0.5
          });
        }

        if (child.material.map) {
          child.material.map.flipY = false;
        }
        if (child.material.normalMap) {
          child.material.normalMap.flipY = false;
        }
      });

      model.position.set(0, -0.6, 0);
      scene.add(model);

      // Animation support
      var mixer = new THREE.AnimationMixer(model);
      var anims = {};
      gltf.animations.forEach(function(clip) {
        anims[clip.name] = clip;
      });
      var playedAnims = {};
      window._mixer = mixer;
      window._anims = anims;
      window._playedAnims = playedAnims;
      console.log('3D model loaded, animations:', Object.keys(anims).length);
      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage('loaded');
      }
    }, undefined, function(error) {
      console.error('GLB parse error:', error);
      if (window.FlutterChannel) window.FlutterChannel.postMessage('error:' + error);
    });
  }

  console.log('Viewer ready');

  // --- Dispose ---
  window.dispose = function() {
    try {
      if (window._mixer) window._mixer.stopAllAction();
      if (renderer) { renderer.dispose(); renderer.forceContextLoss(); }
      if (scene) {
        scene.traverse(function(obj) {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (obj.material.map) obj.material.map.dispose();
            obj.material.dispose();
          }
        });
      }
      console.log('Viewer disposed');
    } catch(e) { console.error('Dispose error:', e); }
  };

  // --- Animation functions ---
  window.playAnimation = function(name, reverse) {
    var mixer = window._mixer;
    var anims = window._anims;
    if (!mixer || !anims[name]) return;
    var clip = anims[name];
    var action = mixer.clipAction(clip);
    action.reset();
    action.setLoop(THREE.LoopOnce);
    action.clampWhenFinished = true;
    if (reverse) {
      action.timeScale = -1;
      action.time = clip.duration;
    } else {
      action.timeScale = 1;
    }
    action.play();
  };

  // Vehicle data for body status
  window._vehicleData = null;

  window.setVehicleData = function(jsonStr) {
    try {
      window._vehicleData = JSON.parse(jsonStr);
      window.updateBodyStatus();
      if (typeof updateWheelLabelData === 'function') updateWheelLabelData();
    } catch(e) {
      console.error('setVehicleData error:', e);
    }
  };

  window.updateBodyStatus = function() {
    var data = window._vehicleData;
    var anims = window._anims;
    var playedAnims = window._playedAnims;
    if (!data || !anims) return;

    var doorMap = {
      'DoorOpen_FL': data.leftFrontDoor,
      'DoorOpen_FR': data.rightFrontDoor,
      'DoorOpen_BL': data.leftRearDoor,
      'DoorOpen_BR': data.rightRearDoor
    };

    var windowMap = {
      'WindowOpen_FL': data.diverWindow,
      'WindowOpen_FR': data.passengerWindow,
      'WindowOpen_BL': data.leftRearWindow,
      'WindowOpen_BR': data.rightRearWindow,
      'WindowOpen_T': data.sunroof
    };

    var trunkMap = {
      'LuggageDoorOpen': data.trunk
    };

    var allMaps = [doorMap, windowMap, trunkMap];
    allMaps.forEach(function(map) {
      Object.keys(map).forEach(function(animName) {
        var status = map[animName];
        if (status === 1 && !playedAnims[animName]) {
          window.playAnimation(animName, false);
          playedAnims[animName] = true;
        } else if (status !== 1 && playedAnims[animName]) {
          window.playAnimation(animName, true);
          delete playedAnims[animName];
        }
      });
    });
  };

  // --- Click vs drag detection ---
  var isDragging = false;
  var isTopView = false;
  canvas.addEventListener('pointerdown', function() { isDragging = false; });
  canvas.addEventListener('pointermove', function() { isDragging = true; });
  canvas.addEventListener('pointerup', function(e) {
    if (!isDragging) {
      e.stopPropagation();
      toggleTopView();
    }
  });

  // --- Wheel labels (tire pressure) ---
  var _wheelLabelsDirty = true;
  var _lastWheelUpdateTime = 0;
  var _wheelLabelAnimId = null;

  function showWheelLabels() {
    var mdl = window._model;
    if (!mdl) { console.log('showWheelLabels: no model'); return; }
    console.log('showWheelLabels called');
    var targetNames = ['GlossyMetal_Wheel_FL', 'GlossyMetal_Wheel_FR', 'GlossyMetal_Wheel_B'];
    var container = document.getElementById('wheel-labels-container');

    if (!container) {
      container = document.createElement('div');
      container.id = 'wheel-labels-container';
      container.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;';
      canvas.parentElement.appendChild(container);

      var positions = {};
      mdl.traverse(function(child) {
        if (child.isMesh && targetNames.indexOf(child.name) >= 0) {
          var box = new THREE.Box3().setFromObject(child);
          var center = box.getCenter(new THREE.Vector3());
          var screenPos = center.clone().project(camera);
          var x = (screenPos.x * 0.5 + 0.5) * canvas.clientWidth;
          var y = (-screenPos.y * 0.5 + 0.5) * canvas.clientHeight;
          positions[child.name] = {
            percentX: (x / canvas.clientWidth * 100),
            percentY: (y / canvas.clientHeight * 100)
          };
          console.log('Found wheel:', child.name, 'at', (x / canvas.clientWidth * 100).toFixed(1) + '%', (y / canvas.clientHeight * 100).toFixed(1) + '%');
        }
      });

      var fl = positions['GlossyMetal_Wheel_FL'];
      var fr = positions['GlossyMetal_Wheel_FR'];
      var b = positions['GlossyMetal_Wheel_B'];
      console.log('Wheel positions found - FL:', !!fl, 'FR:', !!fr, 'B:', !!b);
      if (!fl || !fr || !b) return;

      var createLabel = function(pos, className, xCalc, yCalc) {
        var el = document.createElement('div');
        el.className = className;
        el.style.cssText = 'position:absolute;left:' + xCalc + ';top:' + yCalc + ';width:50px;height:1px;background:white;transform:' + (pos === 'left' ? 'translate(-100%, -50%)' : pos === 'right' ? 'translateY(-50%)' : 'translateX(-50%)') + ';';
        container.appendChild(el);
        return el;
      };

      var createPressure = function(pos, xCalc, yCalc) {
        var el = document.createElement('div');
        el.className = 'tire-pressure';
        el.dataset.pos = pos;
        el.style.cssText = 'position:absolute;left:' + xCalc + ';top:' + yCalc + ';transform:translateX(-50%);color:white;font-size:11px;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.8);';
        container.appendChild(el);
        return el;
      };

      createLabel('left', 'wheel-line', 'calc(' + fl.percentX + '% - 20px)', fl.percentY + '%');
      createPressure('fl', 'calc(' + fl.percentX + '% - 45px)', 'calc(' + fl.percentY + '% - 22px)');

      createLabel('right', 'wheel-line', 'calc(' + fr.percentX + '% + 20px)', fr.percentY + '%');
      createPressure('fr', 'calc(' + fr.percentX + '% + 45px)', 'calc(' + fr.percentY + '% - 22px)');

      createLabel('left', 'wheel-line', 'calc(' + fl.percentX + '% - 20px)', b.percentY + '%');
      createPressure('rl', 'calc(' + fl.percentX + '% - 45px)', 'calc(' + b.percentY + '% + 12px)');

      createLabel('right', 'wheel-line', 'calc(' + fr.percentX + '% + 20px)', b.percentY + '%');
      createPressure('rr', 'calc(' + fr.percentX + '% + 45px)', 'calc(' + b.percentY + '% + 12px)');

      _wheelLabelsDirty = true;
      _wheelLabelAnimId = null;
      var wheelLabelAnim = function() {
        _wheelLabelAnimId = requestAnimationFrame(wheelLabelAnim);
        if (container.style.display === 'none') return;
        if (!_wheelLabelsDirty) return;
        var now = Date.now();
        if (now - _lastWheelUpdateTime < 33) return;
        _wheelLabelsDirty = false;
        _lastWheelUpdateTime = now;

        var lines = container.querySelectorAll('.wheel-line');
        var pressures = container.querySelectorAll('.tire-pressure');
        var pos = {};
        mdl.traverse(function(child) {
          if (child.isMesh && targetNames.indexOf(child.name) >= 0) {
            var box = new THREE.Box3().setFromObject(child);
            var center = box.getCenter(new THREE.Vector3());
            var screenPos = center.clone().project(camera);
            pos[child.name] = {
              px: (screenPos.x * 0.5 + 0.5) * 100,
              py: (-screenPos.y * 0.5 + 0.5) * 100
            };
          }
        });
        var flP = pos['GlossyMetal_Wheel_FL'];
        var frP = pos['GlossyMetal_Wheel_FR'];
        var bP = pos['GlossyMetal_Wheel_B'];
        if (!flP || !frP || !bP) return;

        if (lines[0]) { lines[0].style.left = 'calc(' + flP.px + '% - 20px)'; lines[0].style.top = flP.py + '%'; }
        if (lines[1]) { lines[1].style.left = 'calc(' + frP.px + '% + 20px)'; lines[1].style.top = frP.py + '%'; }
        if (lines[2]) { lines[2].style.left = 'calc(' + flP.px + '% - 20px)'; lines[2].style.top = bP.py + '%'; }
        if (lines[3]) { lines[3].style.left = 'calc(' + frP.px + '% + 20px)'; lines[3].style.top = bP.py + '%'; }

        if (pressures[0]) { pressures[0].style.left = 'calc(' + flP.px + '% - 45px)'; pressures[0].style.top = 'calc(' + flP.py + '% - 22px)'; }
        if (pressures[1]) { pressures[1].style.left = 'calc(' + frP.px + '% + 45px)'; pressures[1].style.top = 'calc(' + frP.py + '% - 22px)'; }
        if (pressures[2]) { pressures[2].style.left = 'calc(' + flP.px + '% - 45px)'; pressures[2].style.top = 'calc(' + bP.py + '% + 12px)'; }
        if (pressures[3]) { pressures[3].style.left = 'calc(' + frP.px + '% + 45px)'; pressures[3].style.top = 'calc(' + bP.py + '% + 12px)'; }
      };
      wheelLabelAnim();
    }

    updateWheelLabelData();
    container.style.display = '';
    container.style.opacity = '0';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        container.style.transition = 'opacity 0.3s';
        container.style.opacity = '1';
      });
    });
    _wheelLabelsDirty = true;
  }

  function updateWheelLabelData() {
    var data = window._vehicleData;
    console.log('updateWheelLabelData, data:', data ? 'exists' : 'null');
    if (!data) return;
    var pressures = { fl: data.lfTyrePressure || 0, fr: data.rfTyrePressure || 0, rl: data.lrTyrePressure || 0, rr: data.rrTyrePressure || 0 };
    console.log('tire pressures:', JSON.stringify(pressures));
    var els = document.querySelectorAll('.tire-pressure');
    console.log('tire-pressure elements:', els.length);
    for (var i = 0; i < els.length; i++) {
      var pos = els[i].dataset.pos;
      if (pos && pressures[pos] !== undefined) {
        els[i].textContent = pressures[pos] + ' kPa';
      }
    }
  }

  function hideWheelLabels() {
    var container = document.getElementById('wheel-labels-container');
    if (container) {
      container.style.display = 'none';
      container.style.opacity = '0';
      container.style.transition = '';
    }
  }

  window.showWheelLabels = showWheelLabels;
  window.updateWheelLabelData = updateWheelLabelData;
  window.hideWheelLabels = hideWheelLabels;

  function toggleTopView() {
    isTopView = !isTopView;
    if (isTopView) {
      controls.enabled = false;
      animateCamera(0, cameraDistance, -5, 0, 1, 0, function() {
        setTimeout(function() {
          showWheelLabels();
        }, 300);
      });
      if (window.FlutterChannel) window.FlutterChannel.postMessage('topView');
    } else {
      hideWheelLabels();
      controls.enabled = true;
      animateCamera(cameraDistance * 0.68, cameraDistance * 0.08, cameraDistance * 0.71, 0, 1, 0);
      if (window.FlutterChannel) window.FlutterChannel.postMessage('normalView');
    }
  }

  window.toggleTopView = function() {
    toggleTopView();
  };

  function animateCamera(x, y, z, upX, upY, upZ, callback) {
    var startPos = camera.position.clone();
    var endPos = new THREE.Vector3(x, y, z);
    var startUp = camera.up.clone();
    var endUp = new THREE.Vector3(upX || 0, upY || 1, upZ || 0);
    var duration = 800;
    var startTime = Date.now();
    controls.maxPolarAngle = Math.PI;
    controls.minPolarAngle = 0;

    function step() {
      var elapsed = Date.now() - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      camera.position.lerpVectors(startPos, endPos, eased);
      camera.up.lerpVectors(startUp, endUp, eased);
      camera.lookAt(0, 0, 0);
      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        if (!isTopView) {
          controls.maxPolarAngle = 1.56;
          controls.minPolarAngle = 1.3;
        }
        if (callback) callback();
      }
    }
    step();
  }
})();
</script>
</body>
</html>
