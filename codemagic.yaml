workflows:
  ios-ipa:
    name: iOS IPA
    max_build_duration: 90
    environment:
      flutter: 3.22.2
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          set -ex
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          set -ex
          cd ios
          pod install
          cd ..
      - name: Build iOS (no codesign)
        script: |
          set -ex
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          set -ex
          # flutter build ios 的标准输出路径
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not at $APP_PATH, searching..."
            APP_PATH=$(find build -path "*/iphoneos/Runner.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            find build -name "Runner.app" -type d
            exit 1
          fi
          echo "Found Runner.app at: $APP_PATH"
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r -y MyEado.ipa Payload
          echo "=== IPA created ==="
          ls -la MyEado.ipa
    artifacts:
      - build/ios/ipa/*.ipa
